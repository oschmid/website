---
title: 'Contact'
---
<!-- TODO papermod style -->
<style>
.align-right {
  text-align: right;
}
.hidden {
  display: none;
}
.submit {
  background-color: #360BA2;
  color: #fff;
  cursor: pointer;
  padding: calc(.5em - 1px) 1em;
  border: 1px solid transparent;
  border-radius: .375em;
  box-shadow: none;
  font-size: 1rem;
}
.submit:hover {
  background-color: #300892;
}
.input {
  max-width: 100%;
  width: 100%;
  padding: 7px;
  border: 1px solid rgb(214, 217, 224);
  border-radius: 6px;
  font-weight: 400;
}
.label {
  font-weight: 700;
}
.margin-right-1 {
  margin-right: 1rem;
}
</style>
<form name="contact" action="/contact-success/" method="POST" netlify-honeypot="pooh" netlify>
    <label class="hidden label" for="pooh">
        <span>Don't fill this out if you're human</span>
        <input id="pooh" name="pooh"/>
    </label>
    <label class="label" for="email">
        <span>Email</span>
        <input class="input" id="email" name="email" autocomplete="email" type="email" placeholder="your@email.com"/>
    </label>
    <p>
    <label class="label" for="message">
        <span>Message</span>
        <textarea class="input" id="message" placeholder="Message..." name="message"></textarea>
    </label>
    <label class="hidden label" for="referrer">
        <span>Referrer</span>
        <input id="referrer" name="referrer"/>
    </label>
    <div class="align-right">
        <a id="cancel" href="/" class="margin-right-1">Cancel</a>
        <button class="submit" type="submit">Send</button>
    </div>
</form>
<script type="text/javascript">
// https://stackoverflow.com/a/46163215
if (document.referrer) {
    document.getElementById('referrer').value = document.referrer;

    var element = document.getElementById('cancel');
    element.setAttribute('href', document.referrer);
    element.onclick = function() {
        history.back();
        return false;
    }
}
</script>
