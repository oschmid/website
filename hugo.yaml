title: Oliver Schmid
theme: ["PaperMod"]
baseURL: https://oliverschmid.ca/
locale: en-ca
enableRobotsTXT: true
menus:
  main:
    - name: "Search" # TODO add magnifying glass icon
      url: "/search/"
module:
  imports:
    disable: false
    path: "github.com/oschmid/csp-inline-hashes"
params:
  assets:
    apple_touch_icon: "/apple-touch-icon.png"
    favicon: "/favicon.ico" # Created using https://favicon.io/favicon-generator/ usng #FFF Almendra SC initials on #A00 background
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    safari_pinned_tab: "/safari-pinned-tab.svg"
  description: 'Oliver Schmid'
  label:
    icon: "/safari-pinned-tab.svg"
    iconHeight: 35
    iconWidth: 35
  profileMode:
    enabled: true
    country: "Canada"
    subtitle: "Software development, art, cooking, politics, TTRPGs"
    imageTitle: "Owl Predator Flying Free by BarbaraALane"
    imageUrl: "/owl-2223092_1280.png"
    imageHeight: 300
    imageWidth: 300
    buttons:
      - name: "Apps"
        url: "/apps/"
      - name: "Art"
        url: "/tags/art/"
      - name: "Posts"
        url: "/posts/"
      - name: "Recipes"
        url: "/recipes/"
      - name: "Contact"
        url: "/contact/"
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  socialIcons:
    - name: "GitHub"
      url: "https://github.com/oschmid"
    - name: "LinkedIn"
      url: "https://www.linkedin.com/in/oliver-schmid-62625514/"
pluralizeListTitles: false
security:
  allowContent:
    - '.*'
taxonomies:
  tag: tags
outputs:
  home:
    - HTML
    - RSS
    - JSON # for search
    - HEADERS
outputFormats:
  HEADERS:
    baseName: "_headers"
    isPlainText: true
    notAlternative: true

